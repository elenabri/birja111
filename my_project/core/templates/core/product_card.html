<div class="card product-card" style="
    background: white; 
    border-radius: 12px; 
    border: 1px solid #e2e8f0; 
    overflow: hidden; 
    display: flex; 
    flex-direction: column;
    height: 100%;">
    
    <div style="height: 160px; background: #f1f5f9; position: relative;">
        {% if ad.image_url %}
            <img src="{{ ad.image_url }}" style="width: 100%; height: 100%; object-fit: cover;">
        {% else %}
            <div style="display: flex; align-items: center; justify-content: center; height: 100%; color: #94a3b8;">
                📷 Нет фото
            </div>
        {% endif %}
        
        <div style="position: absolute; top: 10px; left: 10px; background: rgba(255,255,255,0.9); padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; color: #475569; text-transform: uppercase;">
            {{ ad.get_category_display }}
        </div>
    </div>

    <div style="padding: 15px; flex-grow: 1;">
        <h4 style="margin: 0 0 8px 0; font-size: 16px; color: #1e293b;">{{ ad.title }}</h4>
        
        <div style="margin-bottom: 15px;">
            <span style="font-size: 12px; font-weight: 600; color: #64748b;">ТЗ для блогера:</span>
            <p style="font-size: 13px; color: #334155; line-height: 1.4; margin: 4px 0;">
                {{ ad.description|truncatewords:15 }}
            </p>
        </div>
    </div>

    <div style="padding: 15px; border-top: 1px solid #f1f5f9; display: flex; gap: 10px;">
        <a href="{{ ad.link }}" target="_blank" class="btn-secondary" style="font-size: 12px; text-decoration: none; color: #64748b;">🔗 Ссылка</a>
        
        {% if is_owner_view %}
            <a href="{% url 'edit_ad' ad.id %}" style="font-size: 12px; color: var(--primary); text-decoration: none; font-weight: 600;">Редактировать</a>
        {% else %}
            <button onclick="openMessageModal('{{ ad.id }}')" style="background: var(--primary); color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;">Написать</button>
        {% endif %}
    </div>
</div>
