{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 70vh; font-family: 'Inter', -apple-system, sans-serif;">
    <div style="background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; max-width: 500px; width: 90%;">
        
        <div style="width: 70px; height: 70px; background: #e6fffa; color: #38b2ac; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 32px;">
            ✓
        </div>

        <h2 style="color: #2d3748; margin-bottom: 10px; font-weight: 700;">Регистрация успешна!</h2>
        <p style="color: #718096; line-height: 1.5;">Мы создали ваш аккаунт. Пароль также отправлен на почту:<br>
            <strong style="color: #4a5568;">{{ email }}</strong>
        </p>

        <div style="background: #f7fafc; border: 1px dashed #cbd5e0; padding: 25px; margin: 30px 0; border-radius: 15px; position: relative;">
            <p style="font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: #a0aec0; margin-bottom: 10px; font-weight: 600;">
                Ваш временный пароль
            </p>
            <code style="font-size: 28px; color: #2d3748; font-family: 'Courier New', monospace; font-weight: bold; letter-spacing: 2px;">{{ password }}</code>
            
            <p style="font-size: 12px; color: #f56565; margin-top: 15px;">
                ⚠️ Обязательно сохраните его сейчас, он понадобится для входа.
            </p>
        </div>

        <a href="{% url 'login' %}" 
           style="display: inline-block; background: #4a90e2; color: white; padding: 15px 35px; border-radius: 12px; text-decoration: none; font-weight: 600; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(74, 144, 226, 0.3);"
           onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 6px 20px rgba(74, 144, 226, 0.4)';"
           onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 15px rgba(74, 144, 226, 0.3)';"
        >
            Перейти ко входу
        </a>
    </div>
</div>
{% endblock %}
