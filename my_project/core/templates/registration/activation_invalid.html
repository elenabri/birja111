<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ошибка активации | Tube Flow</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f5f5f7;
            --card-bg: #ffffff;
            --text-main: #1d1d1f;
            --text-secondary: #86868b;
            --accent: #0071e3;
            --error: #ff3b30;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: var(--text-main);
        }

        .error-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            max-width: 400px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .icon-wrapper {
            width: 80px;
            height: 80px;
            background: #fff2f1;
            color: var(--error);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 32px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 16px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 32px;
        }

        .btn-primary {
            display: inline-block;
            background-color: var(--accent);
            color: white;
            padding: 14px 28px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .btn-primary:hover {
            background-color: #0077ed;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 113, 227, 0.3);
        }

        .footer-link {
            margin-top: 24px;
            display: block;
            color: var(--accent);
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="error-card">
    <div class="icon-wrapper">
        <i class="fa-solid fa-link-slash"></i>
    </div>
    <h1>Ссылка недействительна</h1>
    <p>К сожалению, срок действия ссылки истек или она была использована ранее. Пожалуйста, попробуйте войти, чтобы получить новую ссылку.</p>
    
    <a href="{% url 'login' %}" class="btn-primary">Перейти ко входу</a>
    
    <a href="mailto:support@tubeflow.ru" class="footer-link">Связаться с поддержкой</a>
</div>

</body>
</html>
