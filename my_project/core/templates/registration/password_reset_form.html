<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Восстановление пароля | Вкусневич</title>
    <style>
        :root { --primary: #2563eb; --border: #e2e8f0; --text: #1e293b; --label: #64748b; }
        body { background: #f8fafc; font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 400px; text-align: center; }
        h2 { margin-bottom: 10px; color: var(--text); }
        p { color: var(--label); font-size: 14px; margin-bottom: 25px; line-height: 1.5; }
        input[type="email"], input[type="password"] { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; margin-bottom: 20px; }
        .btn { width: 100%; padding: 14px; background: #1e293b; color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: #000; }
        .back-link { display: block; margin-top: 20px; color: var(--primary); text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Забыли пароль?</h2>
        <p>Введите ваш email, и мы отправим вам инструкцию по восстановлению доступа.</p>
        <form method="post">
            {% csrf_token %}
            {{ form.email }}
            <button type="submit" class="btn">Отправить ссылку</button>
        </form>
        <a href="{% url 'login' %}" class="back-link">← Вернуться ко входу</a>
    </div>
</body>
</html>
