{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Inter', -apple-system, sans-serif; background-color: #f8fafc;">
    <div style="background: white; padding: 45px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.07); text-align: center; max-width: 480px; width: 95%;">
        
        <div style="width: 80px; height: 80px; background: #f0fff4; color: #38a169; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 25px; font-size: 36px; border: 2px solid #c6f6d5;">
            ✓
        </div>

        <h2 style="color: #1a202c; margin-bottom: 12px; font-weight: 800; letter-spacing: -0.5px;">Пароль изменен!</h2>
        
        <p style="color: #4a5568; margin-bottom: 35px; line-height: 1.6; font-size: 16px;">
            Ваш новый пароль успешно установлен. Теперь вы можете войти в свой личный кабинет, используя новые данные.
        </p>

        <a href="{% url 'login' %}" 
           style="display: block; background: linear-gradient(135deg, #48bb78 0%, #38a169 100%); color: white; padding: 16px; border-radius: 14px; text-decoration: none; font-weight: 700; font-size: 16px; transition: all 0.3s ease; box-shadow: 0 4px 12px rgba(56, 161, 105, 0.25);"
           onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 6px 20px rgba(56, 161, 105, 0.35)';"
           onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 12px rgba(56, 161, 105, 0.25)';"
        >
            Войти в систему
        </a>

        <p style="margin-top: 25px; font-size: 13px; color: #a0aec0;">
            Если у вас возникли вопросы, свяжитесь с поддержкой.
        </p>
    </div>
</div>
{% endblock %}
