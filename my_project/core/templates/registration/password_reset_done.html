<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проверьте почту | Вкусневич</title>
    <style>
        :root {
            --bg: #f3f4f6;
            --white: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --accent: #2563eb;
        }

        body {
            background-color: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .done-card {
            background: var(--white);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 380px; /* Делаем её компактнее */
            text-align: center;
        }

        .icon-box {
            background: #eff6ff;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 32px;
        }

        h2 {
            color: var(--text-main);
            font-size: 24px;
            margin: 0 0 12px 0;
            font-weight: 700;
        }

        p {
            color: var(--text-muted);
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn-home {
            display: inline-block;
            background: var(--text-main);
            color: var(--white);
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            transition: transform 0.2s, background 0.2s;
        }

        .btn-home:hover {
            background: #000;
            transform: translateY(-1px);
        }

        .spam-notice {
            display: block;
            margin-top: 20px;
            font-size: 13px;
            color: #9ca3af;
        }
    </style>
</head>
<body>

    <div class="done-card">
        <div class="icon-box">✉️</div>
        <h2>Проверьте почту</h2>
        <p>Мы отправили инструкции по смену пароля. Ссылка будет активна в течение ближайшего времени.</p>
        
        <a href="{% url 'login' %}" class="btn-home">Вернуться ко входу</a>
        
        <span class="spam-notice">Не пришло письмо? Проверьте папку «Спам»</span>
    </div>

</body>
</html>
